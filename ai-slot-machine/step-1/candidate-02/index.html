<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Tokenizer</h1>
        <p class="subtitle">"Your prompt is not my command... but for a few tokens, I'll think about it."</p>
        <div id="reels">
        </div>
        <div id="controls">
            <button id="spin-button">Spin</button>
        </div>
        <div id="info">
            <p>Tokens: <span id="token-balance">100</span></p>
            <p id="message">Press "Spin" to start hallucinating.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
