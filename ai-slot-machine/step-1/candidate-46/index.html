<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine">
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin</button>
        </div>
        <div class="stats">
            <div class="tokens">
                <span>Tokens:</span>
                <span id="token-count">100</span>
            </div>
            <div class="winnings">
                <span>Last Win:</span>
                <span id="last-win">0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
