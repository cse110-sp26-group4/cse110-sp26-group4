<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <header>
            <h1>AI Slot Machine</h1>
        </header>
        <div id="reels-container">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div id="controls">
            <div id="token-balance">Tokens: <span>100</span></div>
            <button id="spin-button">Spin</button>
        </div>
        <div id="message">Spin to start!</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
