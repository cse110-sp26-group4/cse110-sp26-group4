<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h1>AI Slot Machine</h1>
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin</button>
        </div>
        <div class="message" id="message"></div>
        <div class="balance">
            <p>Tokens: <span id="token-balance">100</span></p>
        </div>
        <div class="payout-table">
            <h2>Payouts</h2>
            <p>🤖🤖🤖: 50 Tokens</p>
            <p>🧠🧠🧠: 40 Tokens</p>
            <p>💡💡💡: 30 Tokens</p>
            <p>💻💻💻: 20 Tokens</p>
            <p>Any two 🤖: 10 Tokens</p>
            <p>Any two 🧠: 8 Tokens</p>
            <p>Any two 💡: 6 Tokens</p>
            <p>Any two 💻: 4 Tokens</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
