<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <header>
            <h1>AI TOKENIZER</h1>
            <div class="balance">
                <span class="label">Tokens:</span>
                <span id="token-balance">1000</span>
            </div>
        </header>
        <main>
            <div class="reels">
                <div class="reel"></div>
                <div class="reel"></div>
                <div class="reel"></div>
            </div>
        </main>
        <footer>
            <button id="spin-button">SPIN (Cost: 10)</button>
            <p id="message-box">Press SPIN to start!</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
