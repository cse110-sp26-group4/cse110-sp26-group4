<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Token Slot Machine</h1>
            <div class="token-balance">
                <p>Tokens: <span id="token-count">100</span></p>
            </div>
        </header>
        <main>
            <div class="slot-machine">
                <div class="reel"></div>
                <div class="reel"></div>
                <div class="reel"></div>
            </div>
            <button id="spin-button">Spin (Cost: 5 Tokens)</button>
            <p id="message"></p>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
