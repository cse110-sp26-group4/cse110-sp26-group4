name: CI
on: 
  pull_request:
    paths:
      - 'source/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm test